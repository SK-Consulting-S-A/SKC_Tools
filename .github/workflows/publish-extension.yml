# Publish the SKC VS Code Extension (SKC_VSCode_Extension) to VS Code Marketplace.
# Uses the VSCE_PAT repository secret for authentication.
#
# Setup: In the repo go to Settings → Secrets and variables → Actions,
# add a secret named VSCE_PAT with your Azure DevOps Personal Access Token
# (Marketplace → Manage scope).
# Create PAT: https://dev.azure.com → User settings → Personal access tokens
# Scope: Marketplace (Manage).
#
# Repo root is SKC_Tools; this workflow publishes only the extension in SKC_VSCode_Extension/.

name: Publish SKC VS Code Extension

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump'
        required: true
        default: 'Current version'
        type: choice
        options:
          - Current version
          - patch
          - minor
          - major
      pre_release:
        description: 'Publish as pre-release'
        required: false
        default: false
        type: boolean
  release:
    types: [published]

env:
  VSCE_PAT: ${{ secrets.VSCE_PAT }}
  # Extension subfolder in this repo (single place to change if path ever changes)
  EXTENSION_DIR: SKC_VSCode_Extension

jobs:
  publish-vscode-extension:
    name: Publish VS Code Extension (SKC_VSCode_Extension)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.EXTENSION_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.EXTENSION_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Publish VS Code extension to Marketplace
        run: |
          if [ -z "${{ secrets.VSCE_PAT }}" ]; then
            echo "::error::VSCE_PAT secret is not set. Add it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          ARGS=""
          BUMP="${{ github.event.inputs.version_bump }}"
          if [ -n "$BUMP" ] && [ "$BUMP" != "Current version" ]; then
            ARGS="$ARGS $BUMP"
          fi
          if [ "${{ github.event.inputs.pre_release }}" = 'true' ]; then
            ARGS="$ARGS --pre-release"
          fi
          node scripts/publish.js $ARGS
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
